 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PadVending - Smart Sanitary Pad Dispenser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f0f4f8; 
            color: #333;
            line-height: 1.6;
        }
        .header { 
            width: 100%; 
            background: #2563eb; 
            color: #fff; 
            text-align: center; 
            padding: 16px; 
            font-size: 20px; 
            font-weight: bold;
        }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; }
        .card { 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.1); 
            padding: 28px 24px; 
            margin: 20px 0;
        }
        .badge { 
            display: inline-block; 
            padding: 6px 16px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: bold;
            margin-bottom: 20px;
        }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .label { color: #555; font-size: 14px; margin-bottom: 8px; }
        .qty-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 16px 0; }
        .qty-btn { 
            width: 48px; 
            height: 48px; 
            border: 2px solid #2563eb; 
            background: #fff; 
            color: #2563eb; 
            border-radius: 10px; 
            font-size: 24px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-box { 
            width: 60px; 
            height: 48px; 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            font-weight: bold;
        }
        .amount-box { 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            padding: 14px; 
            text-align: center; 
            font-size: 18px; 
            color: #374151; 
            background: #f8fafc;
            margin: 16px 0;
        }
        .btn { 
            width: 100%; 
            background: #2563eb; 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            padding: 14px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 12px;
        }
        .btn-outline { 
            background: #fff; 
            color: #2563eb; 
            border: 2px solid #2563eb; 
        }
        .center { text-align: center; }
        .warning-icon { font-size: 48px; margin-bottom: 16px; }
        .big { font-size: 22px; font-weight: bold; margin: 12px 0; }
        .sub { font-size: 14px; color: #666; margin-bottom: 8px; }
        .footer { 
            background: #1e3a5f; 
            color: #fff; 
            padding: 30px 20px; 
            margin-top: 40px;
        }
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .footer-links a { color: #fff; text-decoration: none; font-size: 14px; }
        .footer-links a:hover { text-decoration: underline; }
        .copyright { text-align: center; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">Sanitary Pad Dispenser</div>
    
    <div class="container">
        <div class="card center">
            <div class="badge badge-green">Stock : 10</div>
            <div class="label">Select Quantity</div>
            <div class="qty-row">
                <button class="qty-btn">−</button>
                <div class="qty-box">1</div>
                <button class="qty-btn">+</button>
            </div>
            <div class="amount-box">Amount : Rs. 10</div>
            <button class="btn">Continue to Payment >></button>
        </div>
    </div>

    <div class="footer">
        <div class="footer-links">
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
            <a href="terms.html">Terms</a>
            <a href="privacy.html">Privacy</a>
            <a href="refund.html">Refunds</a>
        </div>
        <div class="copyright">
            © 2026 PadVending. All rights reserved.<br>
            [Your Business Name as per PAN/GST]
        </div>
    </div>
</body>
</html>
