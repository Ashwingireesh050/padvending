<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadVending - Smart Sanitary Pad Dispenser</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: #fff; border-radius: 20px; padding: 30px; max-width: 400px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .header { text-align: center; margin-bottom: 25px; }
    .header h1 { color: #e91e63; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .stock { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.95rem; }
    .stock span { color: #4caf50; font-weight: bold; }
    .quantity { margin-bottom: 20px; }
    .quantity label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
    .quantity input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1.1rem; text-align: center; }
    .amount { text-align: center; margin-bottom: 20px; }
    .amount .price { font-size: 2.5rem; font-weight: bold; color: #333; }
    .amount .currency { font-size: 1.2rem; color: #666; }
    .pay-btn { width: 100%; padding: 15px; background: #2563eb; color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .pay-btn:hover { background: #1d4ed8; }
    .pay-btn:disabled { background: #ccc; cursor: not-allowed; }
    .status { text-align: center; margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 0.95rem; }
    .status.loading { background: #dbeafe; color: #1e40af; }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .hidden { display: none; }
    .dispensing { text-align: center; padding: 30px; }
    .dispensing .spinner { width: 50px; height: 50px; border: 4px solid #e0e0e0; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-screen { text-align: center; padding: 30px; }
    .success-screen .icon { font-size: 4rem; margin-bottom: 15px; }
    .success-screen h2 { color: #166534; margin-bottom: 10px; }
    .success-screen p { color: #666; }
    .home-btn { margin-top: 20px; padding: 12px 30px; background: #2563eb; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="container" id="mainScreen">
    <div class="header">
      <h1>🩸 PadVending</h1>
      <p>Smart Sanitary Pad Dispenser</p>
    </div>
    <div class="stock">Stock : <span id="stockCount">10</span></div>
    <div class="quantity">
      <label>Select Quantity</label>
      <input type="number" id="qtyInput" value="1" min="1" max="10">
    </div>
    <div class="amount">
      <div class="price" id="totalPrice">₹10</div>
      <div class="currency" id="priceBreakdown">1 pad × ₹10</div>
    </div>
    <button class="pay-btn" id="payBtn" onclick="payNow()">Pay Now</button>
    <div class="status hidden" id="statusMsg"></div>
  </div>

  <div class="container hidden" id="dispensingScreen">
    <div class="dispensing">
      <div class="spinner"></div>
      <h3>Dispensing...</h3>
      <p>Please wait and collect your pad(s)</p>
      <p id="dispenseQty">Qty : 1</p>
    </div>
  </div>

  <div class="container hidden" id="successScreen">
    <div class="success-screen">
      <div class="icon">✅</div>
      <h2>Dispensed Successfully!</h2>
      <p>Thank you. Please collect your pad(s).</p>
      <button class="home-btn" onclick="goHome()">Return to Home</button>
    </div>
  </div>

  <script>
    const PRICE_PER_PAD = 10;
    const BACKEND_URL = 'http://localhost:3000'; // Your local backend
    let currentTxnId = null;

    // Update price when quantity changes
    document.getElementById('qtyInput').addEventListener('input', function() {
      const qty = parseInt(this.value) || 1;
      const total = qty * PRICE_PER_PAD;
      document.getElementById('totalPrice').textContent = '₹' + total;
      document.getElementById('priceBreakdown').textContent = qty + ' pad' + (qty > 1 ? 's' : '') + ' × ₹' + PRICE_PER_PAD;
    });

    async function payNow() {
      const qty = parseInt(document.getElementById('qtyInput').value) || 1;
      const amount = qty * PRICE_PER_PAD;
      const btn = document.getElementById('payBtn');
      const status = document.getElementById('statusMsg');

      btn.disabled = true;
      status.className = 'status loading';
      status.textContent = 'Creating payment order...';
      status.classList.remove('hidden');

      try {
        // Step 1: Create order via backend
        const txnId = 'TXN_' + Date.now();
        currentTxnId = txnId;

        const res = await fetch(BACKEND_URL + '/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            machine_id: 'PAD_VM_001',
            transaction_id: txnId,
            amount: amount,
            quantity: qty,
            price_per_item: PRICE_PER_PAD,
            stock_before: parseInt(document.getElementById('stockCount').textContent)
          })
        });

        const data = await res.json();
        console.log('Order created:', data);

        if (!data.order_id) {
          throw new Error(data.error || 'Failed to create order');
        }

        // Step 2: Open Razorpay checkout
        const options = {
          key: data.razorpay_key,
          amount: data.amount * 100,
          currency: 'INR',
          name: 'PadVending',
          description: 'Sanitary Pad × ' + qty,
          order_id: data.order_id,
          handler: function(response) {
            console.log('Payment success:', response);
            status.className = 'status success';
            status.textContent = 'Payment successful! Dispensing...';
            startDispensing(qty);
          },
          modal: {
            ondismiss: function() {
              btn.disabled = false;
              status.className = 'status error';
              status.textContent = 'Payment cancelled';
            }
          },
          theme: { color: '#2563eb' }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch (err) {
        console.error('Payment error:', err);
        btn.disabled = false;
        status.className = 'status error';
        status.textContent = 'Error: ' + err.message;
      }
    }

    function startDispensing(qty) {
      document.getElementById('mainScreen').classList.add('hidden');
      document.getElementById('dispensingScreen').classList.remove('hidden');
      document.getElementById('dispenseQty').textContent = 'Qty : ' + qty;

      // Simulate dispensing delay (replace with real ESP32 call later)
      setTimeout(() => {
        document.getElementById('dispensingScreen').classList.add('hidden');
        document.getElementById('successScreen').classList.remove('hidden');
        
        // Update stock
        const currentStock = parseInt(document.getElementById('stockCount').textContent);
        document.getElementById('stockCount').textContent = Math.max(0, currentStock - qty);
      }, 3000);
    }

    function goHome() {
      document.getElementById('successScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      document.getElementById('payBtn').disabled = false;
      document.getElementById('statusMsg').classList.add('hidden');
      document.getElementById('qtyInput').value = 1;
      document.getElementById('totalPrice').textContent = '₹10';
      document.getElementById('priceBreakdown').textContent = '1 pad × ₹10';
    }

    // Check if backend is reachable
    fetch(BACKEND_URL + '/api/health')
      .then(r => r.json())
      .then(() => console.log('Backend connected'))
      .catch(() => {
        const status = document.getElementById('statusMsg');
        status.className = 'status error';
        status.textContent = '⚠️ Connect to same WiFi as machine to pay';
        status.classList.remove('hidden');
      });
  </script>
</body>
</html>
